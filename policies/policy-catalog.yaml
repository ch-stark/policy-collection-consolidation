---
# Machine-readable policy catalog for AI consumption
# Custom schema (not a Kubernetes CRD). Each entry = one policy name from a generator.yml policies[] block.
# Entry count (139) != generator.yml file count (~81); each entry is one policy name from a generator.yml policies[] block.
apiVersion: v1
kind: PolicyCatalog
metadata:
  name: policy-collection-consolidation
  description: Consolidated ACM governance policies for ACM 2.15+
  acmMinVersion: "2.15"
  generatedFrom: generator.yml files
  repository: policy-collection-consolidation

policies:
  # ---------------------------------------------------------------------------
  # ACM Configs
  # ---------------------------------------------------------------------------
  - name: acm-addon-config
    path: policies/acm-configs/cluster-addon-config
    category: acm-configs
    description: "Configures ACM addon deployment settings and cluster management addons"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-addon-config
    policyType: ConfigurationPolicy

  - name: acm-placement-tolerations
    path: policies/acm-configs/ensure-placement-toleration
    category: acm-configs
    description: "Ensures placement tolerations are configured on ACM placements"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-placement-toleration
    policyType: ConfigurationPolicy

  - name: generate-feature-placements
    path: policies/acm-configs/feature-flags-placement
    category: acm-configs
    description: "Generates feature-flag-based Placement resources for ACM policy targeting"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-feature-placements
    policyType: ConfigurationPolicy

  - name: klusterlet-selector-tolerations
    path: policies/acm-configs/klusterlet-infra
    category: acm-configs
    description: "Configures klusterlet infrastructure node selectors and tolerations with addon deployment configurations"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-klusterlet-infra
    policyType: ConfigurationPolicy

  - name: acm-kubeadmin-trustca
    path: policies/acm-configs/kubeadmin-config-trustca
    category: acm-configs
    description: "Updates kubeadmin trusted CA configuration on the ACM hub"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-kubeadmin-trustca
    policyType: ConfigurationPolicy

  - name: enable-managed-serviceaccount
    path: policies/acm-configs/managedserviceaccount
    category: acm-configs
    description: "Enables ManagedServiceAccount feature on the MultiClusterEngine"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-managed-sa
    policyType: ConfigurationPolicy

  - name: acm-observe
    path: policies/acm-configs/observability
    category: acm-configs
    description: "Configures ACM Observability with S3 storage, Thanos secret, and MultiClusterObservability CR"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-observability
    policyType: ConfigurationPolicy

  - name: acm-observe-status
    path: policies/acm-configs/observability
    category: acm-configs
    description: "Monitors the health status of ACM Observability"
    remediationAction: inform
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies:
      - acm-observe
    policySets:
      - acm-observability
    policyType: ConfigurationPolicy

  - name: acm-policy-alerts
    path: policies/acm-configs/policy-alerts
    category: acm-configs
    description: "Deploys PrometheusRule for ACM policy compliance alerts on the hub"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-alerts-placements
    policyType: ConfigurationPolicy

  - name: acm-remove-kubeadmin
    path: policies/acm-configs/remove-kubeadmin-pass
    category: acm-configs
    description: "Removes the kubeadmin password secret from the ACM hub cluster"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - acm-remove-kubeadmin
    policyType: ConfigurationPolicy

  - name: acm-cluster-debug-mode
    path: policies/acm-configs/set-cluster-debug-mode
    category: acm-configs
    description: "Manages disabling Governance Policies to enable debugging cluster conditions"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - acm-debug-cluster
    policyType: ConfigurationPolicy

  - name: cluster-is-debug
    path: policies/acm-configs/set-cluster-debug-mode
    category: acm-configs
    description: "Indicates any clusters that are in debug mode.  Disable debug label on ManagedCluster to restore compliance"
    remediationAction: inform
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - acm-debug-cluster
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Application Defaults
  # ---------------------------------------------------------------------------
  - name: app-resource-tracker
    path: policies/application-defaults/app-reload
    category: application-defaults
    description: "Monitors labeled Deployments and restarts them when a watched ConfigMap or Secret changes"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - app-reload
    policyType: ConfigurationPolicy

  - name: multi-cluster-gitops-hub
    path: policies/application-defaults/gitops-multicluster
    category: application-defaults
    description: "Configures ManagedServiceAccount and permissions for each app team to deploy and managed their application from a single argo to all ManagedClusters"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies:
      - gitops-operator
    policySets:
      - multi-cluster-gitops-hub
    policyType: ConfigurationPolicy

  - name: multi-cluster-gitops
    path: policies/application-defaults/gitops-multicluster
    category: application-defaults
    description: "Deploy an instance of Argo for Team Scooter"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - gitops-team-scooter
    policyType: ConfigurationPolicy

  - name: default-block-all-networkpolicy
    path: policies/application-defaults/network-policies
    category: application-defaults
    description: "Enforces a default deny-all NetworkPolicy in user namespaces"
    remediationAction: inform
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - application-defaults-network-policies
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Cluster Configs
  # ---------------------------------------------------------------------------
  - name: apiserver-certificate
    path: policies/cluster-configs/apiserver-cert
    category: cluster-configs
    description: "Provisions a cert-manager Certificate for the API server and configures the named certificate reference"
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies:
      - cert-manager-clusterissuer
    policySets:
      - cluster-configs-apiserver-cert
    policyType: ConfigurationPolicy

  - name: chrony-ntp
    path: policies/cluster-configs/chrony-ntp
    category: cluster-configs
    description: "Applies a MachineConfig to the worker and master MachineConfigPools to configure chronyd with the standard Red Hat NTP pool servers."
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - chrony-ntp
    policyType: ConfigurationPolicy

  - name: cluster-autoscaling
    path: policies/cluster-configs/cluster-autoscaling
    category: cluster-configs
    description: "Configures ClusterAutoscaler and creates MachineAutoscalers for MachineSets labeled with min/max replica counts"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-autoscaling
    policyType: ConfigurationPolicy

  - name: acm-clusterclaims
    path: policies/cluster-configs/clusterclaims
    category: cluster-configs
    description: "Creates ClusterClaims that expose install-config name and OCP minor version as ManagedCluster labels"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-clusterclaims
    policyType: ConfigurationPolicy

  - name: cluster-proxy
    path: policies/cluster-configs/cluster-proxy
    category: cluster-configs
    description: "Configures the cluster-wide HTTP proxy and trusted CA bundle"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-proxy
    policyType: ConfigurationPolicy

  - name: cluster-scheduler
    path: policies/cluster-configs/default-scheduler
    category: cluster-configs
    description: "Labels worker nodes for scheduler targeting and sets the cluster default node selector"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-scheduler
    policyType: ConfigurationPolicy

  - name: disable-self-provisioner
    path: policies/cluster-configs/disable-self-provisioner
    category: cluster-configs
    description: "Disables the self-provisioner ClusterRoleBinding so authenticated users cannot create new projects, and prevents OpenShift from restoring it via the autoupdate annotation."
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - disable-self-provisioner
    policyType: ConfigurationPolicy

  - name: etcd-backup
    path: policies/cluster-configs/etcd-backup
    category: cluster-configs
    description: "Deploys an automated etcd backup CronJob writing snapshots to a PersistentVolumeClaim"
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-etcd-backup
    policyType: ConfigurationPolicy

  - name: etcd-encryption
    path: policies/cluster-configs/etcd-encryption
    category: cluster-configs
    description: "Enables etcd data-at-rest encryption and monitors each API server component for encryption rollout completion"
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "SC System and Communications Protection"
      controls:
        - "SC-28 Protection of Information at Rest"
    dependencies: []
    policySets:
      - etcd-encryption
    policyType: ConfigurationPolicy

  - name: htpasswd-breakglass
    path: policies/cluster-configs/htpasswd-breakglass
    category: cluster-configs
    description: "Configures an htpasswd IdentityProvider named BreakGlass-Emergency with a local redhat user for emergency cluster access when other identity providers are unavailable."
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - htpasswd-breakglass
    policyType: ConfigurationPolicy

  - name: image-registry-pvc
    path: policies/cluster-configs/image-registry-pvc
    category: cluster-configs
    description: "Configures the OpenShift image registry to use a PVC (gp3-csi) for persistent storage."
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - image-registry-pvc
    policyType: ConfigurationPolicy

  - name: image-registry-config-s3
    path: policies/cluster-configs/image-registry-s3
    category: cluster-configs
    description: "Configures the OpenShift image registry to use ODF S3 object storage via NooBaa"
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - image-registry-s3
    policyType: ConfigurationPolicy

  - name: ocp-ingress-infra
    path: policies/cluster-configs/ingress
    category: cluster-configs
    description: "Configures the default IngressController node placement and replica count based on available infra nodes"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-ingress
    policyType: ConfigurationPolicy

  - name: ingress-certificate
    path: policies/cluster-configs/ingress
    category: cluster-configs
    description: "Issues a cert-manager Certificate for the default ingress domain and applies it to the IngressController"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies:
      - cert-manager-clusterissuer
    policySets:
      - cluster-configs-ingress
    policyType: ConfigurationPolicy

  - name: monitor-renew-default-ingress
    path: policies/cluster-configs/ingress-renew-default-cert
    category: cluster-configs
    description: "Monitors default ingress certificate expiry and rotates router secrets when expiration is within 750 hours"
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - ingress-certificate
    policyType: ConfigurationPolicy

  - name: node-kubeletconfigs
    path: policies/cluster-configs/kubeletconfig
    category: cluster-configs
    description: "Applies KubeletConfig resources to enable auto-sized resource reservations on master and worker node pools"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-kubelet
    policyType: ConfigurationPolicy

  - name: infra-machineconfigpool
    path: policies/cluster-configs/machineconfigpools
    category: cluster-configs
    description: "Creates the infra MachineConfigPool targeting nodes with the infra role but not the storage role"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-infra-mcp
    policyType: ConfigurationPolicy

  - name: storage-machineconfigpool
    path: policies/cluster-configs/machineconfigpools
    category: cluster-configs
    description: "Creates the storage MachineConfigPool targeting nodes with both the infra and storage roles"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-storage-mcp
    policyType: ConfigurationPolicy

  - name: infra-machineset
    path: policies/cluster-configs/machinesets
    category: cluster-configs
    description: "Creates infra MachineSet resources across availability zones for nodes with the infra role"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-infra-machinesets
    policyType: ConfigurationPolicy

  - name: storage-machineset
    path: policies/cluster-configs/machinesets
    category: cluster-configs
    description: "Creates storage MachineSet resources across availability zones for nodes with the infra and storage roles"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-storage-machinesets
    policyType: ConfigurationPolicy

  - name: ocp-monitoring
    path: policies/cluster-configs/monitoring
    category: cluster-configs
    description: "Configures cluster monitoring and user-workload monitoring; MCOA variant forwards alerts to the observability hub alertmanager"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-monitoring
    policyType: ConfigurationPolicy

  - name: node-runtimes
    path: policies/cluster-configs/nodes
    category: cluster-configs
    description: "Applies base node-level configuration for cgroup version and CRI-O default runtime across all node pools"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-configs-nodes
    policyType: ConfigurationPolicy

  - name: remove-kubeadmin
    path: policies/cluster-configs/remove-kubeadmin
    category: cluster-configs
    description: "Removes the kubeadmin secret from kube-system to disable the temporary bootstrap admin user after an identity provider has been configured."
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - remove-kubeadmin
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Cluster Health
  # ---------------------------------------------------------------------------
  - name: cluster-health-eval
    path: policies/cluster-health
    category: cluster-health
    description: "Validates cluster health by checking version, ClusterOperators, MachineConfigPools, and node status"
    remediationAction: enforce
    severity: high
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CA Security Assessment and Authorization"
      controls:
        - "CA-7 Continuous Monitoring"
    dependencies: []
    policySets:
      - cluster-health
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Cluster Maintenance
  # ---------------------------------------------------------------------------
  - name: clean-clusterrolebindings
    path: policies/cluster-maintenance
    category: cluster-maintenance
    description: "Identifies stale ClusterRoleBindings for cleanup"
    remediationAction: inform
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - cluster-maintenance
    policyType: ConfigurationPolicy

  - name: clean-rolebindings
    path: policies/cluster-maintenance
    category: cluster-maintenance
    description: "Identifies stale RoleBindings for cleanup"
    remediationAction: inform
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - cluster-maintenance
    policyType: ConfigurationPolicy

  - name: alert-clusterrole-unused
    path: policies/cluster-maintenance
    category: cluster-maintenance
    description: "Alerts on unused ClusterRoles"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - cluster-maintenance
    policyType: ConfigurationPolicy

  - name: clean-groups
    path: policies/cluster-maintenance
    category: cluster-maintenance
    description: "Identifies stale Groups for cleanup"
    remediationAction: inform
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - cluster-maintenance
    policyType: ConfigurationPolicy

  - name: clean-failed-pods
    path: policies/cluster-maintenance
    category: cluster-maintenance
    description: "Removes failed pods caused by node shutdown or CreateContainerError"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - cluster-maintenance
    policyType: ConfigurationPolicy

  - name: clean-olm
    path: policies/cluster-maintenance
    category: cluster-maintenance
    description: "Cleans up old OLM Jobs, ConfigMaps, and blocking InstallPlans"
    remediationAction: enforce
    severity: medium
    compliance:
      standards: []
      categories: []
      controls: []
    dependencies: []
    policySets:
      - cluster-maintenance
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Cluster Validations
  # ---------------------------------------------------------------------------
  - name: operator-lifecycle-status
    path: policies/cluster-validations
    category: cluster-validations
    description: "Detects failed OLM InstallPlans, Subscriptions, and bundle unpacking Jobs across operator namespaces"
    remediationAction: inform
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CA Security Assessment and Authorization"
      controls:
        - "CA-7 Continuous Monitoring"
    dependencies: []
    policySets:
      - cluster-validations
    policyType: ConfigurationPolicy

  - name: validate-cluster-security
    path: policies/cluster-validations
    category: cluster-validations
    description: "Validates cluster security configuration -- currently checks that FIPS mode is not enabled"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CA Security Assessment and Authorization"
      controls:
        - "CA-7 Continuous Monitoring"
    dependencies: []
    policySets:
      - cluster-validations
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Cluster Version
  # ---------------------------------------------------------------------------
  - name: admin-acks
    path: policies/cluster-version
    category: cluster-version
    description: "Ensures the admin-acks ConfigMap is present in openshift-config with acknowledgements for Kubernetes API removals across upgrade paths"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "CM Configuration Management"
      controls:
        - "CM-2 Baseline Configuration"
    dependencies: []
    policySets:
      - cluster-version
    policyType: ConfigurationPolicy

  # ---------------------------------------------------------------------------
  # Gatekeeper Validations
  # ---------------------------------------------------------------------------
  - name: gp-valid-max-devworkspaces
    path: policies/gatekeeper/validations/max-devspaces
    category: gatekeeper
    description: "Deploys a Gatekeeper ConstraintTemplate and Constraint to cap the number of concurrently active Dev Workspaces per cluster"
    remediationAction: enforce
    severity: low
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "AC Access Control"
      controls:
        - "AC-6 Least Privilege"
    dependencies:
      - gatekeeper-instance
    policySets:
      - gp-valid-max-devworkspaces
    policyType: GatekeeperPolicy

  - name: gp-valid-max-iamclusterbindings
    path: policies/gatekeeper/validations/max-iamclusterbindings
    category: gatekeeper
    description: "Deploys a Gatekeeper ConstraintTemplate and Constraint to enforce a maximum number of users bound to a specified ClusterRole across all ClusterRoleBindings"
    remediationAction: enforce
    severity: medium
    compliance:
      standards:
        - "NIST SP 800-53"
      categories:
        - "AC Access Control"
      controls:
        - "AC-6 Least Privilege"
    dependencies:
      - gatekeeper-instance
    policySets:
      - gp-valid-max-iamclusterbindings
    policyType: GatekeeperPolicy

  - name: gp-valid-verifydeprecatedapi
