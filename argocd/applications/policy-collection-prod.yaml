---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: policy-collection-prod
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/part-of: policy-collection
    policy-collection/environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/policy-collection-consolidation.git
    targetRevision: main
    path: environments/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: acm-policies-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
